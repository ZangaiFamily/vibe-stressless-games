name: Deploy Vibe Money to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'vibe-money/**'
      - '.github/workflows/deploy-vibe-money.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          # Find the installed template version and ensure it's accessible
          TEMPLATE_DIR=$(ls -d /root/.local/share/godot/export_templates/*/ 2>/dev/null | head -1)
          if [ -n "$TEMPLATE_DIR" ]; then
            VERSION=$(basename "$TEMPLATE_DIR")
            mkdir -p "/github/home/.local/share/godot/export_templates/$VERSION"
            mv "$TEMPLATE_DIR"* "/github/home/.local/share/godot/export_templates/$VERSION/" 2>/dev/null || true
          fi

      - name: Build web export
        run: |
          mkdir -p build/web/vibe-money
          cd vibe-money
          godot --headless --export-release "Web" ../build/web/vibe-money/index.html

      - name: Add coi-serviceworker for SharedArrayBuffer
        run: |
          cd build/web/vibe-money
          # Download coi-serviceworker to enable SharedArrayBuffer on GitHub Pages
          wget -q https://raw.githubusercontent.com/nickswalker/coi-serviceworker/main/coi-serviceworker.min.js -O coi-serviceworker.min.js || true
          # Inject into index.html if downloaded successfully
          if [ -f coi-serviceworker.min.js ]; then
            sed -i 's|<head>|<head><script src="coi-serviceworker.min.js"></script>|' index.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/vibe-money

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
