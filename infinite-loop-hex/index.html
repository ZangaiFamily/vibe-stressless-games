/**
 * Service Worker Update Manager
 * - Deregisters stale COI service workers that conflict with game loading
 * - Detects new SW versions and shows an update banner
 */
let _pendingWorker = null;

function updateAndReload() {
	if (_pendingWorker) {
		_pendingWorker.postMessage('update');
	} else {
		// Clear all caches and hard reload
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.getRegistrations().then(function (registrations) {
				registrations.forEach(function (reg) { reg.unregister(); });
			});
			caches.keys().then(function (names) {
				names.forEach(function (name) { caches.delete(name); });
			});
		}
		setTimeout(function () { window.location.reload(); }, 300);
	}
}

(function () {
	if (!('serviceWorker' in navigator)) return;

	// Deregister stale COI service workers
	navigator.serviceWorker.getRegistrations().then(function (registrations) {
		registrations.forEach(function (reg) {
			if (reg.active && reg.active.scriptURL.indexOf('coi-serviceworker') !== -1) {
				console.log('[SW] Deregistering stale COI service worker:', reg.active.scriptURL);
				reg.unregister().then(function () {
					console.log('[SW] COI service worker removed — reloading');
					window.location.reload();
				});
			}
		});
	});

	// Monitor for SW updates (if any SW is registered)
	navigator.serviceWorker.getRegistration().then(function (reg) {
		if (!reg) return;

		if (reg.waiting) {
			_pendingWorker = reg.waiting;
			document.getElementById('update-banner').style.display = 'block';
		}

		reg.addEventListener('updatefound', function () {
			var newWorker = reg.installing;
			if (!newWorker) return;

			newWorker.addEventListener('statechange', function () {
				if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
					_pendingWorker = newWorker;
					document.getElementById('update-banner').style.display = 'block';
					console.log('[SW] New version available — update banner shown');
				}
			});
		});
	});

	navigator.serviceWorker.addEventListener('controllerchange', function () {
		console.log('[SW] New service worker activated — reloading');
		window.location.reload();
	});
}());

const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":56544,"index.wasm":28001575},"focusCanvas":true,"gdextensionLibs":[]};
const engine = new Engine(GODOT_CONFIG);

(function () {
	const INDETERMINATE_STATUS_STEP_MS = 100;
	const statusProgress = document.getElementById('status-progress');
	const statusProgressInner = document.getElementById('status-progress-inner');
	const statusIndeterminate = document.getElementById('status-indeterminate');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = 'hidden';

	let animationCallbacks = [];
	function animate(time) {
		animationCallbacks.forEach((callback) => callback(time));
		requestAnimationFrame(animate);
	}
	requestAnimationFrame(animate);

	function animateStatusIndeterminate(ms) {
		const i = Math.floor((ms / INDETERMINATE_STATUS_STEP_MS) % 8);
		if (statusIndeterminate.children[i].style.borderTopColor === '') {
			Array.prototype.slice.call(statusIndeterminate.children).forEach((child) => {
				child.style.borderTopColor = '';
			});
			statusIndeterminate.children[i].style.borderTopColor = '#dfdfdf';
		}
	}

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		[statusProgress, statusIndeterminate, statusNotice].forEach((elem) => {
			elem.style.display = 'none';
		});
		animationCallbacks = animationCallbacks.filter(function (value) {
			return (value !== animateStatusIndeterminate);
		});
		switch (mode) {
		case 'progress':
			statusProgress.style.display = 'block';
			break;
		case 'indeterminate':
			statusIndeterminate.style.display = 'block';
			animationCallbacks.push(animateStatusIndeterminate);
			break;
		case 'notice':
			statusNotice.style.display = 'block';
			break;
		case 'hidden':
			break;
		default:
			throw new Error('Invalid status mode');
		}
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		const msg = err.message || err;
		console.error(msg);
		setStatusNotice(msg);
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures();
	if (missing.length !== 0) {
		const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
		displayFailureNotice(missingMsg + missing.join('\n'));
	} else {
		setStatusMode('indeterminate');
		engine.startGame({
			'onProgress': function (current, total) {
				if (total > 0) {
					statusProgressInner.style.width = `${(current / total) * 100}%`;
					setStatusMode('progress');
					if (current === total) {
						// wait for progress bar animation
						setTimeout(() => {
							setStatusMode('indeterminate');
						}, 500);
					}
				} else {
					setStatusMode('indeterminate');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
			initializing = false;
		}, displayFailureNotice);
	}
}());
		</script>
